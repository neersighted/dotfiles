# entry = string | platform-table
#   A string entry represents the same name across all 3 platforms.
#   A table is used when this behavior is not sufficient.
#
# platform-table = {arch? = string | arch-table, macos? = string | macos-table, freebsd? = string }
#   A tool not existing on a given platform is represented by an omitted key.
#
# arch-table = { name = string, aur = true }
#   An AUR package is represented by the aur key being present and true.
#
# macos-table[0] = { name = string, service? = bool }
#   A formula is the default type; enabling a service is represented by the service key.
#
# macos-table[1] = { type = "cask", name = string, require_sha? = bool }
#   A cask can disable require_sha if needed using the require_sha key.
#
# macos-table[2] = { type = "mas", name = string, id = int }
#   An app store app has an additional, numerical id key.
