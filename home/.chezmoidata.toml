[git.pretty]
    onelineplus = "%C(yellow)%h%C(auto)%d%C(reset) %s %C(blue)(%cr)%C(reset) %C(green)<%aN>"

[tools]
    cargo = [
        "cargo-audit",
        "cargo-fuzz",
        "cargo-llvm-cov",
        "cargo-outdated",
        "cargo-udeps",
        "flamegraph",
    ]
    gem = []
    go = [
        "golang.org/x/tools/cmd/goimports",
        "golang.org/x/vuln/cmd/govulncheck",
        "mvdan.cc/xurls/v2/cmd/xurls",
    ]
    mise = [
        "golangci-lint",
    ]
    npm = [
        "git-recent",
    ]
    pip = []

[wsl.aliases]
    adb        = "adb.exe"
    clion      = "cmd.exe /c clion.cmd"
    cmd        = "cmd.exe"
    goland     = "cmd.exe /c goland.cmd"
    idea       = "cmd.exe /c idea.cmd"
    multipass  = "multipass.exe"
    neovide    = "neovide.exe --wsl"
    powershell = "powershell.exe"
    pycharm    = "cmd /c pycharm.cmd"
    rider      = "cmd /c Rider.cmd"
    smerge     = "smerge.exe"
    studio     = "cmd /c studio.cmd"
    subl       = "subl.exe"
    winget     = "winget.exe"
    wsl        = "wsl.exe"
    ykman      = "ykman.exe"
